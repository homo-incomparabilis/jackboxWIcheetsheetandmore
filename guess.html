<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="menu.css">
    <script src="menu.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НАШШПИОНАЖ — База данных</title>
    <style>
        /* === ПАЛИТРА ЦВЕТОВ === */
        :root {
            --text: #ffffff;
            --accent: #E3E3E3;          /* Основной акцент (Голубой) */
            --accent-final: #00AAB8;    /* Акцент для Финала */
            --ans-color: #00ffcc;       /* Цвет ответов и процентов */
            --input-bg: rgba(0, 0, 0, 0.4);
            --input-border: rgba(255, 255, 255, 0.1);
        }

        html { scrollbar-gutter: stable; overflow-y: scroll; }
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('images\\guess.avif') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* Виньетка для затемнения краев фона и улучшения контраста */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(10,10,15,0.75) 100%);
            z-index: -1;
        }

        .header {
            max-width: 800px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            text-decoration: none;
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid var(--accent);
            padding: 5px 15px;
            border-radius: 5px;
            transition: 0.3s;
            background: rgba(0,0,0,0.2);
        }
        .back-btn:hover { background: var(--accent); color: #000; }

        /* === МАТОВОЕ СТЕКЛО (GLASSMORPHISM) === */
        .glass-card {
            max-width: 800px;
            width: 100%;
            margin: 0 auto 20px;
            background: rgba(20, 20, 27, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .search-box { margin-bottom: 20px; }
        .search-box:last-child { margin-bottom: 0; }

        .search-box input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--input-border);
            background: var(--input-bg);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(227, 227, 227, 0.2); }
        #searchFinal:focus { border-color: var(--accent-final); box-shadow: 0 0 15px rgba(0, 170, 184, 0.2); }

        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            color: var(--accent);
            padding: 12px 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        td { padding: 15px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); background: transparent; vertical-align: top; }
        tr:last-child td { border-bottom: none; }

        .ans { color: var(--ans-color); font-weight: bold; text-shadow: 0 0 8px rgba(0, 255, 204, 0.2); }

        .tips { border-left: 4px solid var(--accent); }
        .tips h3 { margin-top: 0; }
        .tips ul { margin: 10px 0 0 0; padding-left: 20px; }
        .tips li { margin-bottom: 8px; }
        .tips li:last-child { margin-bottom: 0; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="search-box">
        <label style="color: var(--accent); font-size: 0.85rem; margin-left: 5px; display: block; margin-bottom: 8px; letter-spacing: 1px;"><strong>ОБЫЧНЫЕ ВОПРОСЫ</strong></label>
        <input type="text" id="searchInput" placeholder="🔍 Введите вопрос ...">
    </div>
    <div class="search-box">
        <label style="color: var(--accent-final); font-size: 0.85rem; margin-left: 5px; display: block; margin-bottom: 8px; letter-spacing: 1px;"><strong>ФИНАЛЬНЫЙ РАУНД</strong></label>
        <input type="text" id="searchFinal" placeholder="💀 Введите категорию ...">
    </div>
</div>

<div id="qaCard" class="glass-card" style="display: none;">
    <table id="qaTable">
        <thead>
            <tr><th style="width: 70%;">Вопрос</th><th>Ответ</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="finalCard" class="glass-card" style="display: none;">
    <table id="finalTable">
        <thead>
            <tr><th style="width: 55%;">Категория</th><th>Правильные варианты</th></tr>
        </thead>
        <tbody id="finalBody"></tbody>
    </table>
</div>

<div class="glass-card tips">
    <h3>💡 Курс молодого шпиона:</h3>
    <ul>
        <li><strong>Правила игры:</strong> Не спались, что читеришь.</li>
        <li><strong>Риск:</strong> Если значение сильно отличается, делай х2.</li>
        <li><strong>Финальный раунд:</strong> Бро, просто не ошибайся.</li>
    </ul>
</div>

<script src="content/data_guess.js"></script>
<script src="content/data_guess_final.js"></script>

<script>
    window.onload = function() {
        const tableBody = document.getElementById('tableBody');
        const finalBody = document.getElementById('finalBody');
        const qaCard = document.getElementById('qaCard');
        const finalCard = document.getElementById('finalCard');
        const searchInput = document.getElementById('searchInput');
        const searchFinal = document.getElementById('searchFinal');

        const flattenFields = (fields) => fields.reduce((acc, f) => ({ ...acc, [f.n]: f.v }), {});

        // 1. Отрисовка обычных раундов
        if (typeof DB_DATA !== 'undefined') {
            tableBody.innerHTML = DB_DATA.map(raw => {
                const f = flattenFields(raw.fields);
                return `<tr>
                            <td><strong>${f.QText || 'Вопрос не найден'}</strong></td>
                            <td class="ans">${f.A || 0}%</td>
                        </tr>`;
            }).join('');
        }

        // 2. Отрисовка Финального раунда
        if (typeof DB_DATA_FINAL !== 'undefined') {
            finalBody.innerHTML = DB_DATA_FINAL.map(raw => {
                const f = flattenFields(raw.fields);
                let listHtml = '';
                for (let i = 0; i < 3; i++) {
                    const choice = f['Choice' + i];
                    const val = f['Val' + i];
                    if (choice) {
                        listHtml += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.05); padding: 6px 0;">
                                        <span>${choice}</span>
                                        <span class="ans">${val}%</span>
                                     </div>`;
                    }
                }
                return `<tr>
                            <td style="color: var(--accent-final); font-weight: bold; vertical-align: top;">${f.QText}</td>
                            <td>${listHtml}</td>
                        </tr>`;
            }).join('');
        }

        // Общая функция поиска
        const handleSearch = (input, card, body) => {
            const filter = input.value.trim().toLowerCase();
            const rows = body.getElementsByTagName('tr');
            if (filter === "") { card.style.display = "none"; return; }
            let hasResults = false;
            for (let row of rows) {
                const match = row.textContent.toLowerCase().includes(filter);
                row.style.display = match ? "" : "none";
                if (match) hasResults = true;
            }
            card.style.display = hasResults ? "block" : "none";
        };

        searchInput.addEventListener('input', () => handleSearch(searchInput, qaCard, tableBody));
        searchFinal.addEventListener('input', () => handleSearch(searchFinal, finalCard, finalBody));
    };
</script>
</body>
</html>
