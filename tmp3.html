<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="menu.css">
    <script src="menu.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIVIA MURDER PARTY 3 — База данных</title>
    <style>
        /* === ПАЛИТРА ЦВЕТОВ === */
        :root {
            --text: #ffffff;
            --accent: #5A9600;
            --accent-final: #8F0000;
            --ans-color: #39ff14;
            --input-bg: rgba(0, 0, 0, 0.4);
            --input-border: rgba(255, 255, 255, 0.1);
        }

        html { scrollbar-gutter: stable; overflow-y: scroll; }
        * { box-sizing: border-box; outline: none !important; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('images\\TMP3.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* Виньетка */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(10,10,15,0.75) 100%);
            z-index: -1;
        }

        .header { max-width: 800px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { text-decoration: none; color: var(--accent); font-weight: bold; font-size: 0.9rem; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 5px; transition: 0.3s; background: rgba(0,0,0,0.2); }
        .back-btn:hover { background: var(--accent); color: #000; }

        /* === МАТОВОЕ СТЕКЛО (GLASSMORPHISM) === */
        .glass-card {
            max-width: 800px;
            width: 100%;
            margin: 0 auto 20px;
            background: rgba(20, 20, 27, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .search-box { margin-bottom: 20px; }
        .search-box:last-child { margin-bottom: 0; }

        input {
            width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--input-border);
            background: var(--input-bg); color: white; font-size: 1.1rem; transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(212, 0, 255, 0.2); }
        #searchFinal:focus { border-color: var(--accent-final); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--accent); padding: 12px 10px; border-bottom: 2px solid rgba(255,255,255,0.1); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        td { padding: 15px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); background: transparent; vertical-align: top; }
        tr:last-child td { border-bottom: none; }

        .ans { color: var(--ans-color); font-weight: bold; text-shadow: 0 0 8px rgba(57, 255, 20, 0.2); line-height: 1.4; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="search-box">
        <label style="color: var(--accent); font-size: 0.85rem; margin-left: 5px; display: block; margin-bottom: 8px; letter-spacing: 1px;"><strong>ОБЫЧНЫЕ ВОПРОСЫ</strong></label>
        <input type="text" id="searchInput" placeholder="🔍 Введите вопрос ...">
    </div>
    <div class="search-box">
        <label style="color: var(--accent-final); font-size: 0.85rem; margin-left: 5px; display: block; margin-bottom: 8px; letter-spacing: 1px;"><strong>ФИНАЛЬНЫЙ РАУНД</strong></label>
        <input type="text" id="searchFinal" placeholder="💀 Введите категорию ...">
    </div>
</div>

<div id="qaCard" class="glass-card" style="display: none;">
    <table id="qaTable"><thead><tr><th>Вопрос</th><th>Ответ</th></tr></thead><tbody id="tableBody"></tbody></table>
</div>

<div id="finalCard" class="glass-card" style="display: none;">
    <table id="finalTable"><thead><tr><th>Категория</th><th>Варианты</th></tr></thead><tbody id="finalBody"></tbody></table>
</div>

<script src="content/data_tmp3.js"></script>
<script src="content/data_tmp3_final.js"></script>

<script>
    window.onload = function() {
        const parseJackText = (t) => t ? t.replace(/\[[^\]]+=[^\]]+\]/g, '').replace(/\[i\]/g, '<i>').replace(/\[\/i\]/g, '</i>').trim() : '-';

        const render = (data, bodyId, rowFn) => {
            const list = Array.isArray(data) ? data : (data ? data.content : []);
            document.getElementById(bodyId).innerHTML = list.map(rowFn).join('');
        };

        if (typeof DB_DATA !== 'undefined') render(DB_DATA, 'tableBody', item => {
            const c = item.choices ? item.choices.find(x => x.correct) : null;
            return `<tr><td>${parseJackText(item.question)}</td><td class="ans">${c ? parseJackText(c.text) : '-'}</td></tr>`;
        });

        if (typeof DB_DATA_FINAL !== 'undefined') render(DB_DATA_FINAL, 'finalBody', item => {
            const list = item.choices
                ? item.choices.filter(x => x.correct).map(x => parseJackText(x.text)).sort((a, b) => a.localeCompare(b)).join("<br>")
                : '-';
            return `<tr><td style="color:var(--accent-final); font-weight:bold; width: 40%;">${parseJackText(item.categoryName)}</td><td class="ans">${list}</td></tr>`;
        });

        const setupSearch = (id, cardId, bid) => {
            const input = document.getElementById(id), card = document.getElementById(cardId), rows = document.getElementById(bid).getElementsByTagName('tr');
            input.addEventListener('input', () => {
                const f = input.value.trim().toLowerCase();
                if (!f) { card.style.display = "none"; return; }
                let found = false;
                for (let r of rows) { const m = r.textContent.toLowerCase().includes(f); r.style.display = m ? "" : "none"; if (m) found = true; }
                card.style.display = found ? "block" : "none";
            });
        };
        setupSearch('searchInput', 'qaCard', 'tableBody');
        setupSearch('searchFinal', 'finalCard', 'finalBody');
    };
</script>
</body>
</html>
